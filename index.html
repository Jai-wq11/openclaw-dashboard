<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--sidebar:#161822;--card:#1c1e2e;--card-hover:#242640;--border:#2a2d3e;--primary:#6c5ce7;--primary-hover:#7c6ff7;--text:#e8e8f0;--text-muted:#8888a0;--success:#00b894;--warning:#fdcb6e;--danger:#e17055;--info:#74b9ff}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden}
.sidebar{width:220px;background:var(--sidebar);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:100;transition:transform .3s}
.sidebar .logo{padding:0 20px 30px;font-size:1.4rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:10px}
.sidebar .logo i{font-size:1.6rem}
.nav-item{padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;color:var(--text-muted);transition:all .2s;border-left:3px solid transparent;font-size:.9rem}
.nav-item:hover,.nav-item.active{background:rgba(108,92,231,.1);color:var(--text);border-left-color:var(--primary)}
.nav-item i{width:20px;text-align:center}
.main{margin-left:220px;flex:1;padding:30px;width:calc(100% - 220px)}
.tab-content{display:none;animation:fadeIn .3s}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
h1{font-size:1.8rem;margin-bottom:20px;font-weight:600}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .2s}
.card:hover{background:var(--card-hover);transform:translateY(-2px)}
.card h3{font-size:1.1rem;margin-bottom:12px;color:var(--primary)}
.card-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:.85rem}
.card-row .label{color:var(--text-muted)}
.card-row .value{font-weight:500}
.badge{padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:500}
.badge-success{background:rgba(0,184,148,.15);color:var(--success)}
.badge-warning{background:rgba(253,203,110,.15);color:var(--warning)}
.badge-info{background:rgba(116,185,255,.15);color:var(--info)}
.badge-danger{background:rgba(225,112,85,.15);color:var(--danger)}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-sm{padding:5px 12px;font-size:.8rem}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
a.drive-link{color:var(--info);text-decoration:none;font-size:.85rem}
a.drive-link:hover{text-decoration:underline}
input,select,textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:.85rem;font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
textarea{resize:vertical;min-height:60px}
.notes-field{margin-top:10px}
.notes-field textarea{width:100%;margin-top:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px;width:90%;max-width:500px}
.modal h2{margin-bottom:20px;font-size:1.3rem}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;font-size:.85rem;color:var(--text-muted)}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:15px;overflow-x:auto}
.cal-header{padding:8px;text-align:center;font-size:.8rem;color:var(--text-muted);font-weight:600}
.cal-day{background:var(--card);border:1px solid var(--border);padding:8px;min-height:80px;border-radius:6px;font-size:.8rem;cursor:pointer;transition:background .2s}
.cal-day:hover{background:var(--card-hover)}
.cal-day .day-num{font-weight:600;margin-bottom:4px}
.cal-day.other-month{opacity:.3}
.cal-day.today{border-color:var(--primary)}
.cal-event{background:rgba(108,92,231,.2);color:var(--primary);padding:2px 4px;border-radius:3px;margin-bottom:2px;font-size:.7rem;white-space:normal;word-break:break-word}
.cal-nav{display:flex;align-items:center;gap:15px;margin-bottom:10px}
.cal-nav h2{font-size:1.2rem;min-width:200px}
.assignment-table{width:100%;border-collapse:collapse;margin-top:15px}
.assignment-table th,.assignment-table td{padding:12px 15px;text-align:left;border-bottom:1px solid var(--border);font-size:.85rem}
.assignment-table th{color:var(--text-muted);font-weight:600;font-size:.8rem;text-transform:uppercase}
.assignment-table tr:hover td{background:rgba(108,92,231,.05)}
.employee-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:15px}
.employee-card h3{color:var(--primary);margin-bottom:8px}
.todo-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:all .2s}
.todo-item:hover{background:var(--card-hover)}
.todo-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.todo-item.done .todo-text{text-decoration:line-through;opacity:.5}
.todo-text{flex:1;font-size:.9rem}
.todo-meta{display:flex;gap:8px;align-items:center;flex-shrink:0}
.priority-high{color:var(--danger)}
.priority-medium{color:var(--warning)}
.priority-low{color:var(--success)}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.green{background:var(--success)}
.status-dot.yellow{background:var(--warning)}
.status-dot.red{background:var(--danger)}
.sync-status{position:fixed;bottom:20px;right:20px;padding:8px 16px;border-radius:20px;font-size:.8rem;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;gap:8px;z-index:50}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.main{margin-left:0;width:100%;padding:15px}
.hamburger{display:block}
.cards{grid-template-columns:1fr}
.calendar-grid{font-size:.7rem}
.cal-day{min-height:50px;padding:4px}
.meeting-expand{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.meeting-expand.open{display:block}
.meeting-expand h4{font-size:.85rem;color:var(--primary);margin:10px 0 5px}
.meeting-expand ul{padding-left:18px;font-size:.82rem;line-height:1.6}
.meeting-expand p{font-size:.82rem;line-height:1.5;color:var(--text-muted)}
.meeting-toggle{background:none;border:none;color:var(--info);cursor:pointer;font-size:.82rem;margin-top:8px;padding:0}
.meeting-toggle:hover{text-decoration:underline}
.meeting-participants{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.meeting-participants span{background:rgba(108,92,231,.15);color:var(--primary);padding:2px 8px;border-radius:12px;font-size:.75rem}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
}
</style>
</head>
<body>

<nav class="sidebar" id="sidebar">
  <div class="logo"><i class="fas fa-bolt"></i> OpenClaw</div>
  <div class="nav-item active" onclick="switchTab('customers')"><i class="fas fa-users"></i> Customers</div>
  <div class="nav-item" onclick="switchTab('calendar')"><i class="fas fa-calendar-alt"></i> Calendar</div>
  <div class="nav-item" onclick="switchTab('assignments')"><i class="fas fa-user-tag"></i> Assignments</div>
  <div class="nav-item" onclick="switchTab('projects')"><i class="fas fa-project-diagram"></i> Projects</div>
  <div class="nav-item" onclick="switchTab('todos')"><i class="fas fa-check-square"></i> To-Do List</div>
  <div class="nav-item" onclick="switchTab('briefs')"><i class="fas fa-folder-open"></i> Client Briefs</div>
  <div class="nav-item" onclick="switchTab('meetings')"><i class="fas fa-microphone-alt"></i> Meeting Briefs</div>
</nav>

<main class="main">
  <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>

  <!-- CUSTOMERS -->
  <div class="tab-content active" id="tab-customers">
    <div class="top-bar"><h1>Customers</h1><button class="btn btn-primary" onclick="showModal('customer')"><i class="fas fa-plus"></i> Add Customer</button></div>
    <div class="cards" id="customers-grid"></div>
  </div>

  <!-- CALENDAR -->
  <div class="tab-content" id="tab-calendar">
    <div class="top-bar"><h1>Calendar</h1><button class="btn btn-primary" onclick="showModal('event')"><i class="fas fa-plus"></i> Add Event</button></div>
    <div class="cal-nav">
      <button class="btn btn-outline btn-sm" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
      <h2 id="cal-month-label"></h2>
      <button class="btn btn-outline btn-sm" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>

  <!-- ASSIGNMENTS -->
  <div class="tab-content" id="tab-assignments">
    <div class="top-bar"><h1>Assignments</h1></div>
    <div style="margin-bottom:20px">
      <a href="https://docs.google.com/spreadsheets/d/13ttu3Nbd-tinH5y0j9xTHU2oX5I3cwFB9M22fjWKR44" target="_blank" class="btn btn-outline btn-sm"><i class="fas fa-external-link-alt"></i> Master Payment Tracker</a>
    </div>
    <div id="employees-section"></div>
    <h2 style="margin:25px 0 10px">Client Assignments</h2>
    <table class="assignment-table">
      <thead><tr><th>Client</th><th>Assigned To</th><th>Action</th></tr></thead>
      <tbody id="assignments-tbody"></tbody>
    </table>
  </div>

  <!-- PROJECTS -->
  <div class="tab-content" id="tab-projects">
    <div class="top-bar"><h1>Projects</h1><button class="btn btn-primary" onclick="showModal('project')"><i class="fas fa-plus"></i> Add Project</button></div>
    <div class="cards" id="projects-grid"></div>
  </div>

  <!-- TODOS -->
  <div class="tab-content" id="tab-todos">
    <div class="top-bar"><h1>To-Do List</h1><button class="btn btn-primary" onclick="showModal('todo')"><i class="fas fa-plus"></i> Add Task</button></div>
    <div id="todos-list"></div>
  </div>

  <!-- BRIEFS -->
  <div class="tab-content" id="tab-briefs">
    <div class="top-bar"><h1>Client Briefs</h1></div>
    <div class="cards" id="briefs-grid"></div>
  </div>

  <!-- MEETING BRIEFS -->
  <div class="tab-content" id="tab-meetings">
    <div class="top-bar"><h1>Meeting Briefs</h1>
      <div style="display:flex;gap:10px;align-items:center">
        <span id="meetings-status" style="font-size:.8rem;color:var(--text-muted)"></span>
        <button class="btn btn-primary" onclick="fetchFirefliesMeetings()"><i class="fas fa-sync-alt"></i> Refresh</button>
      </div>
    </div>
    <div id="meetings-grid" class="cards"></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<div class="sync-status" id="sync-status"><span class="status-dot green"></span> Synced</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = { databaseURL: "https://openclaw-dashboard-28911-default-rtdb.asia-southeast1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dbRef = db.ref('dashboard');

let DATA = { customers: {}, events: {}, projects: {}, todos: {} };
let suppressFirebaseWrite = false;
let calYear = 2026, calMonth = 2; // March 2026

const EMPLOYEES = [
  { id:'nouman', name:'Nouman', rate:'$25/hr', sheet:'https://docs.google.com/spreadsheets/d/1K5UdFX4FtwRn6jUmVN3PeOc7bOGXjSL7YlCA25iNXao' },
  { id:'asif', name:'Asif', rate:'TBD', sheet:null },
  { id:'ahshan', name:'Ahshan', rate:'$45/hr', sheet:'https://docs.google.com/spreadsheets/d/1d43D2pWt-2vVp83zKvVFXTngLFeqqld4QgNFXMi4ffk' },
  { id:'ali', name:'Ali', rate:'TBD', sheet:null }
];

const DEFAULT_DATA = {
  customers: {
    c1:{name:'Frank Frausto',package:'Custom upgrade',status:'Part 2 pending',employee:'TBD',drive:'https://drive.google.com/drive/folders/1r7MIDsHOxIpxzSgIzyuuGr5P0_bgQXPm',notes:''},
    c2:{name:'Andy Watkins',package:'TBD',status:'Onboarding done',employee:'TBD',drive:'https://drive.google.com/drive/folders/1_BPbrxbhaxDZKxKNJwa5JwKxjVRQzDFv',notes:''},
    c3:{name:'William Tan',package:'$2000 custom',status:'Agents being built',employee:'Nouman',drive:'https://drive.google.com/drive/folders/1_PlSR9Ej1ATnDnEZPv7HXlPIEEsBScKh',notes:''},
    c4:{name:'Charles Dumont',package:'TBD',status:'Awaiting confirmation',employee:'TBD',drive:'https://drive.google.com/drive/folders/13PzRMuDlkkWGJz8bA5eLWURpFUCtfs4H',notes:''},
    c5:{name:'Marshall',package:'Pro $399',status:'Call Mar 14',employee:'TBD',drive:'https://drive.google.com/drive/folders/14-zcapvCgzA_GaevXpbX5bELxCPXKm20',notes:''},
    c6:{name:'Dustin',package:'Paid',status:'Setup in progress',employee:'Ahshan',drive:'https://drive.google.com/drive/folders/14L1TLGP7AZvV2_M3fr3ow2_ZQV8gRN1S',notes:''},
    c7:{name:'Dean Cooper',package:'TBD',status:'Follow-up Mar 16',employee:'TBD',drive:'https://drive.google.com/drive/folders/1Kz3rVc07d4g_mnJgFL2QV31gSULcMgyz',notes:''},
    c8:{name:'THF (William Agency)',package:'$2000 custom',status:'6 agents built',employee:'Nouman',drive:'https://drive.google.com/drive/folders/1eGDzFor4VJci3TTEpH8YfiYtCzOOLOYr',notes:''}
  },
  events: {
    e1:{date:'2026-03-14',time:'13:00',title:'Marshall - Setup Call (10PM PST)',client:'Marshall'},
    e2:{date:'2026-03-16',time:'17:00',title:'Dean Cooper - Setup Follow-up',client:'Dean Cooper'},
    e3:{date:'2026-03-10',time:'16:00',title:'Frank - Setup Call (held)',client:'Frank Frausto'},
    e4:{date:'2026-03-07',time:'22:00',title:'Andy - Onboarding Call (held)',client:'Andy Watkins'},
    e5:{date:'2026-02-24',time:'16:00',title:'William - Zoom Call (held)',client:'William Tan'},
    e6:{date:'2026-03-05',time:'21:00',title:'Charles - Discovery Call (held)',client:'Charles Dumont'},
    e7:{date:'2026-03-06',time:'20:00',title:'Charles - Follow-up Call (held)',client:'Charles Dumont'},
    e8:{date:'2026-03-10',time:'21:00',title:'Dustin - Setup Call via RingCentral (held)',client:'Dustin'},
    e9:{date:'2026-03-12',time:'20:30',title:'Dustin - AnyDesk Call via RingCentral (held)',client:'Dustin'}
  },
  projects: {
    p1:{name:'Frank Frausto - Part 2 Build',client:'Frank Frausto',step:'Waiting on Part 2 requirements doc to send to Frank',status:'In Progress',notes:'Part 1 complete. Need to confirm bot output delivery (Dashboard vs WhatsApp). Send requirements doc.'},
    p2:{name:'William Tan - Agent Setup',client:'William Tan',step:'Agents being built, dedicated WhatsApp line next',status:'In Progress',notes:'$2,000 paid. SOP documentation promised. Follow-up sent Mar 12 about WhatsApp line.'},
    p3:{name:'THF - 6-Agent Marketing Team',client:'THF (William Agency)',step:'Connect agents to live ad platforms (Meta, Google, TikTok)',status:'In Progress',notes:'6 agents built by Nouman (7h30m). Supabase DB set up. SSH access established. Next: GoHighLevel/Monday.com integration + live ad platform connections.'},
    p4:{name:'Charles Dumont - 3 Agent Build',client:'Charles Dumont',step:'Awaiting customer confirmation before starting build',status:'Blocked',notes:'3 agents scoped and priced. Charles approved. Waiting on his construction company customer to confirm. Payment not yet received.'},
    p5:{name:'Marshall - Pro Setup',client:'Marshall',step:'Onboarding call scheduled Mar 14 10PM HKT',status:'Not Started',notes:'Paid via Bitcoin. Security concerns addressed. Call confirmed for Mar 14.'},
    p6:{name:'Dustin - OpenClaw Setup',client:'Dustin',step:'Continue setup via AnyDesk, Dustin needs OpenAI credits',status:'In Progress',notes:'Multiple calls done (Ahshan assigned). AnyDesk connected. Dustin needs to set up OpenAI credits. Feedback: use copy/paste instructions.'}
  },
  todos: {
    t1:{text:'Build proposal + superman stuff for THF group',done:false,priority:'high',due:''},
    t2:{text:'Create a security risks video for OpenClaw',done:false,priority:'high',due:''},
    t3:{text:'Create an OpenClaw Explained in 12 Minutes (for beginners)',done:false,priority:'medium',due:''},
    t4:{text:'Spreadsheet organization',done:false,priority:'medium',due:''},
    t5:{text:'Talk to Jaiden about expenses',done:false,priority:'high',due:''},
    t6:{text:'Proposals on website',done:false,priority:'medium',due:''},
    t7:{text:'Anthropic and Replit payment handled',done:false,priority:'high',due:''},
    t8:{text:'Video editing',done:false,priority:'low',due:''},
    t9:{text:'YouTube partnerships',done:false,priority:'low',due:''}
  }
};

// Firebase sync
dbRef.on('value', snap => {
  const val = snap.val();
  if (!val) {
    dbRef.set(DEFAULT_DATA);
    return;
  }
  suppressFirebaseWrite = true;
  DATA = { customers: val.customers||{}, events: val.events||{}, projects: val.projects||{}, todos: val.todos||{} };
  localStorage.setItem('oc-dashboard', JSON.stringify(DATA));
  renderAll();
  suppressFirebaseWrite = false;
  setSyncStatus('green','Synced');
}, err => {
  console.error('Firebase error:', err);
  const cached = localStorage.getItem('oc-dashboard');
  if (cached) DATA = JSON.parse(cached);
  else DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  renderAll();
  setSyncStatus('red','Offline');
});

function saveData() {
  if (suppressFirebaseWrite) return;
  localStorage.setItem('oc-dashboard', JSON.stringify(DATA));
  setSyncStatus('yellow','Saving...');
  dbRef.set(DATA).then(() => setSyncStatus('green','Synced')).catch(() => setSyncStatus('red','Error'));
}

function setSyncStatus(color, text) {
  const el = document.getElementById('sync-status');
  el.innerHTML = `<span class="status-dot ${color}"></span> ${text}`;
}

function uid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// Tab switching
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.nav-item')[['customers','calendar','assignments','projects','todos','briefs','meetings'].indexOf(tab)].classList.add('active');
  document.getElementById('sidebar').classList.remove('open');
  if (tab === 'calendar') renderCalendar();
  if (tab === 'meetings') loadMeetings();
}

function renderAll() {
  renderCustomers();
  renderCalendar();
  renderAssignments();
  renderProjects();
  renderTodos();
  renderBriefs();
}

// CUSTOMERS
function renderCustomers() {
  const grid = document.getElementById('customers-grid');
  const custs = DATA.customers || {};
  grid.innerHTML = Object.entries(custs).map(([id, c]) => `
    <div class="card">
      <h3>${esc(c.name)}</h3>
      <div class="card-row"><span class="label">Package</span><span class="value">${esc(c.package)}</span></div>
      <div class="card-row"><span class="label">Status</span><span class="value"><span class="badge ${statusBadge(c.status)}">${esc(c.status)}</span></span></div>
      <div class="card-row"><span class="label">Employee</span><span class="value">${esc(c.employee)}</span></div>
      <div class="card-row"><a href="${esc(c.drive)}" target="_blank" class="drive-link"><i class="fas fa-folder"></i> Google Drive</a></div>
      <div class="notes-field">
        <label style="font-size:.8rem;color:var(--text-muted)">Notes</label>
        <textarea onchange="updateCustomerNote('${id}',this.value)" placeholder="Add notes...">${esc(c.notes||'')}</textarea>
      </div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="editCustomer('${id}')"><i class="fas fa-edit"></i></button>
        <button class="btn btn-outline btn-sm" onclick="deleteItem('customers','${id}')" style="color:var(--danger)"><i class="fas fa-trash"></i></button>
      </div>
    </div>
  `).join('');
}

function statusBadge(s) {
  s = (s||'').toLowerCase();
  if (s.includes('done') || s.includes('built') || s.includes('paid')) return 'badge-success';
  if (s.includes('pending') || s.includes('awaiting') || s.includes('progress')) return 'badge-warning';
  if (s.includes('call') || s.includes('follow')) return 'badge-info';
  return 'badge-info';
}

function updateCustomerNote(id, val) { DATA.customers[id].notes = val; saveData(); }

function editCustomer(id) {
  const c = DATA.customers[id];
  showModal('customer', id, c);
}

// CALENDAR
function renderCalendar() {
  const grid = document.getElementById('calendar-grid');
  const label = document.getElementById('cal-month-label');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  label.textContent = months[calMonth] + ' ' + calYear;
  
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();
  
  let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-header">${d}</div>`).join('');
  
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) html += `<div class="cal-day other-month"><div class="day-num">${prevDays - i}</div></div>`;
  
  const events = Object.values(DATA.events || {});
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const dayEvents = events.filter(e => e.date === dateStr);
    html += `<div class="cal-day${isToday?' today':''}" onclick="showModal('event',null,{date:'${dateStr}'})">
      <div class="day-num">${d}</div>
      ${dayEvents.map(e => `<div class="cal-event" title="${esc(e.title)}">${esc(e.time)} ${esc(e.title)}</div>`).join('')}
    </div>`;
  }
  const totalCells = firstDay + daysInMonth;
  const rows = Math.ceil(totalCells / 7);
  const targetCells = rows * 7;
  for (let i = 1; i <= (targetCells - totalCells); i++) html += `<div class="cal-day other-month"><div class="day-num">${i}</div></div>`;
  
  grid.innerHTML = html;
}

function changeMonth(dir) { calMonth += dir; if (calMonth > 11) { calMonth = 0; calYear++; } if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }

// MEETING BRIEFS (Fireflies.ai)
const FIREFLIES_KEY = '26c44944-a858-4cec-89ed-52a87b0101e7';
const FIREFLIES_URL = 'https://api.fireflies.ai/graphql';
let meetingsData = [];

function loadMeetings() {
  const cached = db.ref('meetingBriefs');
  cached.once('value').then(snap => {
    const val = snap.val();
    if (val && val.transcripts && val.transcripts.length) {
      meetingsData = val.transcripts;
      renderMeetings();
      document.getElementById('meetings-status').textContent = 'Cached · Last fetched: ' + (val.fetchedAt ? new Date(val.fetchedAt).toLocaleString() : 'unknown');
    } else {
      fetchFirefliesMeetings();
    }
  }).catch(() => fetchFirefliesMeetings());
}

async function fetchFirefliesMeetings() {
  const status = document.getElementById('meetings-status');
  const grid = document.getElementById('meetings-grid');
  status.innerHTML = '<span class="spinner"></span> Fetching from Fireflies...';
  grid.innerHTML = '';

  try {
    const res = await fetch(FIREFLIES_URL, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + FIREFLIES_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: `{ transcripts { id title date duration summary { overview shorthand_bullet action_items } participants } }` })
    });
    const json = await res.json();
    if (json.errors) throw new Error(json.errors[0].message);
    meetingsData = (json.data.transcripts || []).sort((a,b) => {
      const da = a.date ? new Date(Number(a.date) > 1e12 ? Number(a.date) : a.date) : 0;
      const db2 = b.date ? new Date(Number(b.date) > 1e12 ? Number(b.date) : b.date) : 0;
      return db2 - da;
    });
    // Cache to Firebase
    db.ref('meetingBriefs').set({ transcripts: meetingsData, fetchedAt: Date.now() });
    renderMeetings();
    status.textContent = `${meetingsData.length} meetings · Updated just now`;
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
    console.error('Fireflies error:', err);
    // Try cached
    const local = localStorage.getItem('oc-meetings');
    if (local) { meetingsData = JSON.parse(local); renderMeetings(); }
  }
}

function renderMeetings() {
  localStorage.setItem('oc-meetings', JSON.stringify(meetingsData));
  const grid = document.getElementById('meetings-grid');
  if (!meetingsData.length) { grid.innerHTML = '<p style="color:var(--text-muted)">No meetings found.</p>'; return; }

  grid.innerHTML = meetingsData.map((m, i) => {
    const date = m.date ? new Date(Number(m.date) > 1e12 ? Number(m.date) : m.date) : null;
    const dateStr = date ? date.toLocaleDateString('en-US', {weekday:'short',year:'numeric',month:'short',day:'numeric'}) : 'Unknown date';
    const dur = m.duration ? Math.round(m.duration / 60) + ' min' : 'N/A';
    const participants = (m.participants || []);
    const summary = m.summary || {};
    const bullets = summary.shorthand_bullet ? summary.shorthand_bullet.split('\n').filter(Boolean) : [];
    const actions = summary.action_items ? summary.action_items.split('\n').filter(Boolean) : [];

    return `<div class="card">
      <h3><i class="fas fa-video" style="margin-right:6px"></i>${esc(m.title || 'Untitled Meeting')}</h3>
      <div class="card-row"><span class="label">Date</span><span class="value">${esc(dateStr)}</span></div>
      <div class="card-row"><span class="label">Duration</span><span class="value">${esc(dur)}</span></div>
      ${participants.length ? `<div style="margin-top:4px;font-size:.8rem;color:var(--text-muted)">Participants</div><div class="meeting-participants">${participants.map(p=>'<span>'+esc(p)+'</span>').join('')}</div>` : ''}
      <button class="meeting-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'▲ Hide details':'▼ Show details'">▼ Show details</button>
      <div class="meeting-expand">
        ${summary.overview ? `<h4>Overview</h4><p>${esc(summary.overview)}</p>` : ''}
        ${bullets.length ? `<h4>Key Points</h4><ul>${bullets.map(b=>'<li>'+esc(b)+'</li>').join('')}</ul>` : ''}
        ${actions.length ? `<h4>Action Items</h4><ul>${actions.map(a=>'<li>'+esc(a)+'</li>').join('')}</ul>` : ''}
        ${!summary.overview && !bullets.length && !actions.length ? '<p>No summary available.</p>' : ''}
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
